name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check, Lint, Test, Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ows-canton

      - name: Format check
        run: cargo fmt -p ows-canton -- --check

      - name: Clippy
        run: cargo clippy -p ows-canton -- -D warnings

      - name: Tests
        run: cargo test -p ows-canton

      - name: Doc build
        run: cargo doc -p ows-canton --no-deps
