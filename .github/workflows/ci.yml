name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check, Lint, Test, Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ows-canton

      - name: Format check
        working-directory: ows-canton
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: ows-canton
        run: cargo clippy -- -D warnings

      - name: Tests
        working-directory: ows-canton
        run: cargo test

      - name: Doc build
        working-directory: ows-canton
        run: cargo doc --no-deps
