# Canton Sandbox Configuration
#
# This file is used with the Canton sandbox command to start a local Canton node
# for integration testing. Canton 3.4+ includes a built-in sandbox mode.
#
# Usage:
#   java -jar canton.jar sandbox \
#     --json-api-port 6864 \
#     --ledger-api-port 6865 \
#     --no-tty
#
# The HTTP JSON API (Ledger API v2) runs on --json-api-port (default: 6864).
# Integration tests connect to http://localhost:6864.
#
# See scripts/run-sandbox-tests.sh for automated startup.
canton {
  features.enable-testing-commands = yes
}
